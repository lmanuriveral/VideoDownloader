version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=production
    volumes:
      - ./backend/temp:/app/temp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/download/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:3001/api
    ports:
      - "80:80"
    depends_on:
      - backend